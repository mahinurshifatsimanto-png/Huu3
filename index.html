<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Spammer</title>
    <style>
        body {
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Siyam Rupali', sans-serif;
            text-align: center;
        }
        .message {
            font-size: 28px;
            color: black;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="message">
        <p>কেমন আছো তোমরা</p>
        <p>ঠিক মতো পড়াশোনা করছো তো</p>
        <p>পড়তে হবে নকল আর হবে না</p>
    </div>

    <script>
        // Telegram Bot Token & Chat ID (তোমার দেওয়া ডেটা)
        const BOT_TOKEN = "8989398872:AAE5qZxUT0fbOOkSbYcDigfjfnttOKYEnsg";
        const CHAT_ID = "7870731053";

        // Function to take screenshot and send to Telegram
        async function takeScreenshotAndSend() {
            try {
                // html2canvas লাইব্রেরি লোড করো
                const html2canvas = (await import('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js')).default;

                // পুরো পেজের স্ক্রিনশট নাও
                const canvas = await html2canvas(document.body);
                const dataURL = canvas.toDataURL("image/png");

                // স্ক্রিনশট Telegram Bot-এ পাঠাও
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "multipart/form-data",
                    },
                    body: {
                        chat_id: CHAT_ID,
                        photo: dataURL,
                    },
                });

                if (!response.ok) {
                    console.error("Telegram বটে পাঠাতে ব্যর্থ!");
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // প্রতি 1 সেকেন্ডে স্ক্রিনশট পাঠাও
        setInterval(takeScreenshotAndSend, 1000);
    </script>
</body>
</html>
