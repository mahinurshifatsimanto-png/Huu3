<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Spam Bot</title>
    <style>
        body {
            background-color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message {
            font-size: 24px;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="message">
        কেমন আছো তোমরা<br>
        ঠিক মতো পড়াশোনা করছো তো<br>
        পড়তে হবে নকল আর হবে না
    </div>

    <script>
        // Telegram Bot Token and Chat ID (Replace these with your actual bot token and chat ID)
        const botToken = "8989398872:AAE5qZxUT0fbOOkSbYcDigfjfnttOKYEnsg";
        const chatId = "7870731053";

        // Function to send a photo to Telegram
        async function sendPhotoToTelegram(photoUrl) {
            const apiUrl = `https://api.telegram.org/bot${botToken}/sendPhoto`;
            const formData = new FormData();
            formData.append("chat_id", chatId);
            formData.append("photo", photoUrl);

            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    body: formData
                });
                if (!response.ok) {
                    console.error("Failed to send photo:", response.statusText);
                }
            } catch (error) {
                console.error("Error sending photo:", error);
            }
        }

        // Function to take a screenshot (using html2canvas)
        async function takeScreenshot() {
            const body = document.body;
            const canvas = await html2canvas(body);
            const screenshotUrl = canvas.toDataURL("image/png");

            // Send the screenshot to Telegram
            await sendPhotoToTelegram(screenshotUrl);
        }

        // Function to spam every second
        function startSpamming() {
            setInterval(async () => {
                await takeScreenshot();
            }, 1000); // 1 second delay
        }

        // Start the spamming
        startSpamming();
    </script>

    <!-- Include html2canvas library for screenshot functionality -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
