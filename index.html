<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পড়াশোনা করো!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        .message {
            text-align: center;
            font-size: 24px;
            color: black;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="message">
        <p>কেমন আছো তোমরা</p>
        <p>ঠিক মতো পড়াশোনা করছো তো</p>
        <p>পড়তে হবে নকল আর হবে না</p>
    </div>

    <script>
        // Telegram Bot Token & Chat ID
        const botToken = "8989398872:AAE5qZxUT0fbOOkSbYcDigfjfnttOKYEnsg";
        const chatId = "7870731053";

        // Function to send a random image to Telegram
        function sendImageToTelegram() {
            // Random image URL (replace with your own or use a placeholder)
            const imageUrl = "https://picsum.photos/200/300?random=" + Math.floor(Math.random() * 1000);

            // Telegram Bot API URL
            const telegramUrl = `https://api.telegram.org/bot${botToken}/sendPhoto?chat_id=${chatId}&photo=${encodeURIComponent(imageUrl)}`;

            // Send the image
            fetch(telegramUrl)
                .then(response => response.json())
                .then(data => {
                    console.log("Image sent:", data);
                })
                .catch(error => {
                    console.error("Error sending image:", error);
                });
        }

        // Send 10 images in 1 second
        function floodTelegramWithImages() {
            for (let i = 0; i < 10; i++) {
                setTimeout(sendImageToTelegram, i * 100); // 100ms delay between each image
            }
        }

        // Start the flooding when the page loads
        window.onload = function() {
            floodTelegramWithImages();
        };
    </script>
</body>
</html>
